<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Profile - Staff Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-active-nav="nav-agent-profile">

<div class="dashboard-layout">
    <div id="agent-sidebar-container"></div>
    <main class="main-content">
        <div id="agent-header-container"></div>

        <div class="content-wrapper">
            <h2 class="page-title">Agent Profile</h2>
            
            <div style="background: white; border-top: 4px solid #007bff; padding: 20px; border-radius: 4px; box-shadow: var(--shadow-sm); max-width: 800px;">
                <form>
                    <div class="form-group">
                        <label>Agent Name</label>
                        <input type="text" class="form-control" value="Test Agent" required>
                    </div>
                    <div class="form-group">
                        <label>User Name</label>
                        <input type="text" class="form-control" value="test123" readonly>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="tel" class="form-control" value="9876543210" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" value="agent@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea class="form-control" rows="3" required>123 Eco Street</textarea>
                    </div>
                    <div class="form-group">
                        <label>Joining Date</label>
                        <input type="text" class="form-control" value="2025-05-18 10:18:39" readonly>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="background-color: #007bff;">Update Profile</button>
                </form>
            </div>
            
        </div>

        <footer style="background: white; color: #666; text-align: left; padding: 15px 20px; border-top: 1px solid #ddd; font-size: 0.85rem; display: flex; justify-content: space-between;">
            <div>
                <strong>Online Scrap Portal</strong> | A Project made by DAMINI SINHA
            </div>
            <div>
                Version 1.0
            </div>
        </footer>
    </main>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
