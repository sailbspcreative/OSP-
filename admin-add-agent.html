<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Scrap Agent - Online Scrap Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-active-nav="nav-add-agent">

<div class="dashboard-layout">
    <div id="admin-sidebar-container"></div>
    <main class="main-content">
        <div id="admin-header-container"></div>

        <div class="content-wrapper">
            <h2 class="page-title">Add Scrap Agent</h2>
            
            <div style="background: white; border-top: 4px solid #007bff; padding: 20px; border-radius: 4px; box-shadow: var(--shadow-sm); max-width: 800px;">
                <form action="admin-action-success.html">
                    <div class="form-group">
                        <label>Profile Pic</label>
                        <input type="file" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Fullname</label>
                        <input type="text" class="form-control" placeholder="Enter Fullname" required>
                    </div>
                    <div class="form-group">
                        <label>Email ID</label>
                        <input type="email" class="form-control" placeholder="Enter Email ID" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" class="form-control" placeholder="Enter Mobile Number" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea class="form-control" rows="3" placeholder="Enter Address" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" class="form-control" placeholder="Enter Username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="Enter Password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="background-color: #007bff;">Submit</button>
                </form>
            </div>
            
        </div>

        <footer style="background: white; color: #666; text-align: left; padding: 15px 20px; border-top: 1px solid #ddd; font-size: 0.85rem; display: flex; justify-content: space-between;">
            <div>
                <strong>Online Scrap Portal</strong> | A Project made by Virendra hirwani
            </div>
            <div>
                Version 1.0
            </div>
        </footer>
    </main>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
