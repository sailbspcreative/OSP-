<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrap Agent Dashboard - Online Scrap Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-active-nav="nav-agent-dashboard">

<div class="dashboard-layout">
    <!-- Sidebar Container -->
    <div id="agent-sidebar-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header Container -->
        <div id="agent-header-container"></div>

        <div class="content-wrapper">
            <h2 style="margin-bottom: 20px; font-weight: 400;">Dashboard</h2>

            <div class="stats-grid">
                <div class="stat-card" style="background-color: #17a2b8;">
                    <h3>5</h3>
                    <p>All bookings</p>
                    <i class="fas fa-book bg-icon"></i>
                    <a href="agent-all-bookings.html" class="more-info">More info <i class="fas fa-arrow-circle-right"></i></a>
                </div>
                <div class="stat-card" style="background-color: #007bff;">
                    <h3>1</h3>
                    <p>Assigned bookings</p>
                    <i class="fas fa-user-plus bg-icon"></i>
                    <a href="agent-assigned-bookings.html" class="more-info">More info <i class="fas fa-arrow-circle-right"></i></a>
                </div>
                <div class="stat-card bg-warning">
                    <h3>0</h3>
                    <p>Agent on the way</p>
                    <i class="fas fa-truck bg-icon"></i>
                    <a href="agent-ontheway-bookings.html" class="more-info">More info <i class="fas fa-arrow-circle-right"></i></a>
                </div>
                <div class="stat-card bg-success">
                    <h3>0</h3>
                    <p>Agent Reached</p>
                    <i class="fas fa-map-marker-alt bg-icon"></i>
                    <a href="agent-reached-bookings.html" class="more-info">More info <i class="fas fa-arrow-circle-right"></i></a>
                </div>
                <div class="stat-card bg-danger">
                    <h3>2</h3>
                    <p>Scrap Collected</p>
                    <i class="fas fa-box bg-icon"></i>
                    <a href="agent-collected-bookings.html" class="more-info">More info <i class="fas fa-arrow-circle-right"></i></a>
                </div>
                <div class="stat-card bg-info">
                    <h3>2</h3>
                    <p>Scrap Recycled</p>
                    <i class="fas fa-recycle bg-icon"></i>
                    <a href="agent-recycled-bookings.html" class="more-info">More info <i class="fas fa-arrow-circle-right"></i></a>
                </div>
            </div>
        </div>

        <footer style="background: white; color: #666; text-align: left; padding: 15px 20px; border-top: 1px solid #ddd; font-size: 0.85rem; display: flex; justify-content: space-between;">
            <div>
                <strong>Online Scrap Portal</strong> | A Project made by DAMINI SINHA
            </div>
            <div>
                Version 1.0
            </div>
        </footer>
    </main>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
