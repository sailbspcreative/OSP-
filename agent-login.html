<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login - Online Scrap Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .admin-login-box {
            background: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 360px;
        }
        .admin-logo {
            text-align: center;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--secondary);
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .admin-logo strong {
            font-weight: 800;
        }
        .login-msg {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            margin-bottom: 15px;
        }
        .input-group input {
            border-right: none;
            border-radius: 4px 0 0 4px;
        }
        .input-group-text {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-left: none;
            padding: 10px 15px;
            border-radius: 0 4px 4px 0;
            color: #777;
        }
        .btn-blue {
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            padding: 8px 15px;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .btn-blue:hover {
            background-color: #0056b3;
        }
        .admin-footer-links {
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .admin-footer-links a {
            color: #007bff;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="admin-login-box">
        <div class="admin-logo">
            <strong>Scrap Agents</strong> |<br>Scrap Portal
        </div>
        <div class="login-msg">Sign in to start your session</div>
        
        <form action="agent-dashboard.html">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Username" required>
                <div class="input-group-text"><i class="fas fa-envelope"></i></div>
            </div>
            <div class="input-group">
                <input type="password" class="form-control" placeholder="Password" required>
                <div class="input-group-text"><i class="fas fa-lock"></i></div>
            </div>
            
            <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
                <button type="submit" class="btn-blue" style="width: auto;">Sign In</button>
            </div>
        </form>
        
        <div class="admin-footer-links">
            <a href="#">I forgot my password</a>
            <a href="index.html">Home Page</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
